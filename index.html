<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Electronics – PYQ Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #4f9eff;
    --accent2: #7c5cfc;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8ecf4;
    --muted: #7a85a0;
    --tag: #252d3f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--muted); }
  .score-badge {
    display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: var(--muted);
  }
  .score-badge strong { color: var(--text); font-size: 15px; }
  .header-try {
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-try:hover,
  .header-try.active {
    background: rgba(79,158,255,0.12);
  }
  .header-try.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 3px rgba(79,158,255,0.22);
  }
  .progress-bar-wrap {
    width: 140px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 20px 80px;
    flex: 1;
  }

  /* UNIT SELECTOR */
  .unit-tabs {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
  }
  .unit-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .unit-tab:hover { border-color: var(--accent); color: var(--accent); }
  .unit-tab.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .q-card.answered { border-color: var(--border); }

  .q-meta {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
    background: var(--tag); padding: 3px 8px; border-radius: 4px;
  }
  .q-source {
    font-size: 11px; color: var(--accent2);
    background: rgba(124,92,252,0.12); padding: 3px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .q-text {
    font-size: 15px; line-height: 1.65;
    color: var(--text); margin-bottom: 20px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    color: var(--text);
    font-size: 14px; line-height: 1.5;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(79,158,255,0.07);
  }
  .option-btn:disabled { cursor: default; }

  .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    background: var(--tag); color: var(--muted);
    min-width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  }

  .option-btn.correct {
    background: rgba(34,197,94,0.12);
    border-color: var(--correct);
  }
  .option-btn.correct .opt-letter {
    background: var(--correct); color: #fff;
  }
  .option-btn.wrong {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
  }
  .option-btn.wrong .opt-letter {
    background: var(--wrong); color: #fff;
  }
  .option-btn.reveal-correct {
    background: rgba(34,197,94,0.07);
    border-color: rgba(34,197,94,0.4);
  }
  .option-btn.reveal-correct .opt-letter {
    background: rgba(34,197,94,0.3); color: var(--correct);
  }

  /* RESULT PILL */
  .result-pill {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px;
    font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 20px;
  }
  .result-pill.correct { background: rgba(34,197,94,0.15); color: var(--correct); }
  .result-pill.wrong { background: rgba(239,68,68,0.12); color: var(--wrong); }

  /* SOLUTION BOX */
  .solution-box {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    display: none;
  }
  .solution-box.visible { display: block; }
  .solution-box strong { color: var(--text); }

  /* NAV / CONTROLS */
  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-top: 8px; flex-wrap: wrap;
  }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text); font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    padding: 9px 20px; border-radius: 8px;
    cursor: pointer; transition: all 0.18s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent); color: #fff;
  }
  .btn.primary:hover { background: #3b8fee; }

  .q-counter { font-size: 13px; color: var(--muted); }
  .q-counter strong { color: var(--text); }

  /* SUMMARY */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
  }
  .summary-card h2 { font-size: 26px; margin-bottom: 8px; }
  .summary-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .summary-stats {
    display: flex; justify-content: center; gap: 32px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* MODE SELECTOR */
  .mode-bar {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
  }
  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted); font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 16px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--surface2); border-color: var(--accent); color: var(--accent);
  }

  /* PAGINATION DOTS */
  .dot-row {
    display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 24px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); cursor: pointer; transition: all 0.2s;
  }
  .dot.current { background: var(--accent); transform: scale(1.3); }
  .dot.correct { background: var(--correct); }
  .dot.wrong { background: var(--wrong); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  @media (max-width: 600px) {
    header { align-items: flex-start; gap: 12px; flex-direction: column; }
    .score-badge { width: 100%; flex-wrap: wrap; }
    .q-card { padding: 18px; }
    .q-text { font-size: 14px; }
    .summary-card { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PE<span>/</span>PYQ</div>
  <div class="score-badge">
    <span>Score: <strong id="hdr-score">0/0</strong></span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="hdr-progress" style="width:0%"></div>
    </div>
    <button class="header-try" id="mode-try" onclick="setMode('try')">Try Again</button>
  </div>
</header>

<div class="container">
  <!-- Unit Tabs -->
  <div class="unit-tabs" id="unit-tabs"></div>

  <!-- Mode Bar -->
  <div class="mode-bar">
    <button class="mode-btn active" id="mode-one" onclick="setMode('one')">One by One</button>
    <button class="mode-btn" id="mode-all" onclick="setMode('all')">All Questions</button>
  </div>

  <!-- Dot Row (one-by-one mode) -->
  <div class="dot-row" id="dot-row"></div>

  <!-- Questions Area -->
  <div id="questions-area"></div>

  <!-- Nav Bar (one-by-one) -->
  <div class="nav-bar" id="nav-bar" style="display:none">
    <button class="btn" onclick="navigate(-1)">← Prev</button>
    <span class="q-counter">Q <strong id="q-idx">1</strong> of <strong id="q-total">1</strong></span>
    <button class="btn primary" onclick="navigate(1)">Next →</button>
  </div>
</div>

<script>
// ─── ALL QUESTIONS DATA ───────────────────────────────────────────────────────
const UNITS = [
  {
    name: "Unit 1: Semiconductor Devices",
    short: "U1",
    questions: [
      { q: "The terms anode and cathode are not applicable to", opts: ["SCR","Diode","Triac","GTO"], ans: 2, src: "EPDCL-10" },
      { q: "The rectifier-mode operation of triac can be overcome by increasing", opts: ["anode current","gate current","holding current","latching current"], ans: 1, src: "EPDCL-10" },
      { q: "The equivalent capacitance of the depletion layer of reverse biased junction of an SCR is 30 pF, fired with a dv/dt of 150 V/μs. The capacitive current IC flowing through the junction is", opts: ["4.0 mA","4.5 mA","5.0 mA","5.5 mA"], ans: 1, src: "EPDCL-10" },
      { q: "JFET is", opts: ["voltage-controlled device","current controlled device","resistance-controlled device","conductance-controlled device"], ans: 0, src: "EPDCL-10" },
      { q: "The latching current of T1 is 1 mA. The minimum width of gate pulse required to turn on SCR is (L=0.2H, Vs=200V)", opts: ["2 μs","1 μs","0.5 μs","1.5 μs"], ans: 1, src: "APGenco-12" },
      { q: "A thyristor (SCR) turns off when the", opts: ["Gate pulse is removed","Gate pulse is applied","Thyristor current is below holding value","Anode voltage is made negative"], ans: 2, src: "Transco-12" },
      { q: "Turn-on of a thyristor (SCR) takes place when", opts: ["Anode to cathode voltage is positive","Anode to cathode voltage is negative","Positive current is applied to gate","Anode to cathode voltage is positive AND positive current pulse is applied to gate"], ans: 3, src: "Transco-12" },
      { q: "A triac is a device which acts as a", opts: ["Diode in forward, thyristor in reverse","Thyristor in both directions","Diode in both directions","Thyristor in forward, diode in reverse"], ans: 1, src: "Transco-12" },
      { q: "A GTO", opts: ["Requires special turn-off circuit like SCR","Can be turned off by removing gate pulse","Can be turned off by negative pulse to gate","Can be turned off by positive gate pulse"], ans: 2, src: "Transco-12" },
      { q: "Which power device is NOT a current triggered device?", opts: ["Thyristor","GTO","Triac","MOSFET"], ans: 3, src: "Transco-12" },
      { q: "The number of p-n junctions in a thyristor is", opts: ["1","2","3","4"], ans: 2, src: "Transco-12" },
      { q: "The purpose of snubber circuit across a SCR is to", opts: ["Eliminate dv/dt","Increase dv/dt","Reduce dv/dt","Keep transient overvoltage at constant value"], ans: 2, src: "Transco-12" },
      { q: "The main advantage of IGBT over SCR in power electronics", opts: ["Reduced weight","Self-commutating capability","Very high reliability","Self-cooling property"], ans: 1, src: "EPDCL-14" },
      { q: "Ten thyristors are used in a string to withstand 15 kV DC. Worst-case steady state voltage = 1800 V. Derating factor is", opts: ["33.3%","15.5%","23.3%","16.66%"], ans: 3, src: "APSPDCL-14" },
      { q: "The device which is used as voltage variable resistor", opts: ["BJT","JFET","SCR","PN-diode"], ans: 1, src: "APSPDCL-14" },
      { q: "A SCR triggered by current pulse at gate-cathode can be turned OFF", opts: ["by applying a pulse to cathode","by applying a pulse to anode","by applying opposite polarity pulse to gate-cathode","by reversing polarity of anode and cathode voltage"], ans: 3, src: "ISRO-14" },
      { q: "An IGBT has", opts: ["low input impedance and high conduction losses","low input impedance and low conduction losses","high input impedance and high conduction losses","high input impedance and low conduction losses"], ans: 3, src: "HMWS-15" },
      { q: "Which of the following devices has the lowest 'maximum switching frequency'?", opts: ["GTO","IGBT","SCR","MOSFET"], ans: 2, src: "HMWS-15" },
      { q: "SCR is more utilized compared to Triac because it is", opts: ["more capable in control","more efficient","available with higher ratings","comparatively cheaper"], ans: 0, src: "TSGenco-15", note:"Answer key shows a,c both correct" },
      { q: "A snubber circuit is connected to a power semiconductor device to reduce the", opts: ["turn-on time","turn-off time","electrical stresses","thermal resistance"], ans: 2, src: "APTransco-17" },
      { q: "Which phenomenon is present in thyristors but absent in BJT, MOSFET and IGBT?", opts: ["forward conduction","latching","forward blocking","reverse breakdown"], ans: 1, src: "APTransco-17" },
      { q: "RC triggering is preferred over resistance triggering because", opts: ["it provides triggering at a precise instant","it gives a longer duration gate pulse","it enables triggering at larger firing angle","it protects SCR against high dv/dt"], ans: 2, src: "APTransco-17" },
      { q: "The minimum value of anode current in an SCR required to sustain conduction with zero gate current is called", opts: ["Fundamental current","Latching current","Holding current","Base current"], ans: 2, src: "TSPSC-AEE-23" },
      { q: "A semiconductor device TRIAC contains:", opts: ["two SCRs connected in reverse parallel","two BJTs connected in series","two SCRs connected in series","two SCRs connected in parallel"], ans: 0, src: "APPSC-20" },
      { q: "If the amplitude of gate pulse applied to a thyristor is increased then", opts: ["Both delay and rise time would increase","The delay time would increase but rise time would decrease","The delay time would decrease and rise time would increase","The delay time would decrease and rise time would remain unaffected"], ans: 3, src: "TSSPDCL-22" },
      { q: "The function of an R–C snubber circuit connected in parallel to an SCR is", opts: ["Limiting di/dt through the SCR","Triggering the SCR","Preventing over voltages across the SCR","Forced commutation of the SCR"], ans: 2, src: "TSPSC-AEE-23" },
      { q: "Consider: A-Schottky diode, B-SCR, C-IGBT, D-BJT. Match: 1-Current ctrl on/off, 2-Majority carrier, 3-Voltage ctrl on/off, 4-Four-layer device. Correct match:", opts: ["A-2, B-1, C-3, D-4","A-1, B-2, C-3, D-4","A-2, B-4, C-3, D-1","A-4, B-2, C-1, D-3"], ans: 2, src: "TSPSC-AEE-23" },
      { q: "Statements about a triac: A. Bidirectional current & voltage. B. Equivalent to two antiparallel thyristors. C. Can be turned on with both +ve and -ve gate currents. Which are true?", opts: ["A, B and C","A and B only","A and C only","B and C only"], ans: 0, src: "TSPSC-AEE-23" },
      { q: "Which is an example for a voltage bidirectional two quadrant switch?", opts: ["SCR","BJT","Diode","MOSFET"], ans: 0, src: "TSPSC-AEE-23" },
      { q: "The transfer characteristic of IGBT is a plot of (IC = collector current, VGE = gate-emitter voltage)", opts: ["VCE (y) vs IC (x)","VGE (y) vs IC (x)","IC (y) vs VCE (x)","IC (y) vs VGE (x)"], ans: 3, src: "TSSPDCL-AE-2023" },
      { q: "Identify wrong statements: i. IGBT is voltage-controlled. ii. Power MOSFET is current controlled. iii. Turn OFF time of IGBT < MOSFET. iv. IGBT has high input impedance.", opts: ["i and ii only","ii and iii only","iii and iv only","iv and i only"], ans: 1, src: "TSGenco-24" },
      { q: "MOSFETs are connected in parallel very easily because", opts: ["Conductivity modulation is absent","Its on-state voltage drop is very low","Its Gate-drive circuits are simple","It has positive temperature coefficient of on-state resistance"], ans: 3, src: "TSGenco-24" },
    ]
  },
  {
    name: "Unit 2: AC to DC Converters",
    short: "U2",
    questions: [
      { q: "The peak inverse voltage of each diode in a single-phase bridge rectifier is", opts: ["4Vm","2Vm","Vm","Vm/π"], ans: 2, src: "EPDCL-10" },
      { q: "In a single-phase full converter, for continuous conduction, each pair of SCRs conducts for", opts: ["π − α","π","α","π + α"], ans: 1, src: "EPDCL-10" },
      { q: "A single-phase full converter can operate in", opts: ["4 quadrants","3 quadrants","2 quadrants","1 quadrant"], ans: 2, src: "EPDCL-10" },
      { q: "A single phase fully controlled rectifier has average output voltage of 200 V when α=0. Output voltage when α=30° is approximately", opts: ["200 V","160 V","173 V","183 V"], ans: 2, src: "APGenco-12" },
      { q: "A free-wheeling diode in a phase-controlled converter", opts: ["Decreases possibility of discontinuous conduction","Increases possibility of discontinuous conduction","Reduces power factor and causes over voltage","Causes over voltages"], ans: 0, src: "Transco-12" },
      { q: "The ripple content of load current of a converter feeding RL load is decided by", opts: ["Load resistance alone","Load inductance alone","Both load resistance and load inductance","Neither resistance nor inductance"], ans: 2, src: "Transco-12" },
      { q: "In a thyristorised converter, a freewheeling diode is used to", opts: ["Add to conduction current of thyristor","Oppose the thyristor conduction","Conduct current during off period of thyristor","Protect thyristor by providing a shunt path"], ans: 2, src: "Transco-12" },
      { q: "In a 2-pulse bridge converter with free-wheeling diode, width of diode current pulse over one cycle is (α = firing angle)", opts: ["π + α","π − α","π","2α"], ans: 3, src: "EPDCL-14" },
      { q: "The ripple factor of full-wave rectifier compared to half-wave rectifier without filter is", opts: ["half of half-wave","less than half of half-wave","equal to half-wave","more than half of half-wave"], ans: 1, src: "ISRO-14" },
      { q: "A single-phase full converter with R-L load is triggered at 30°. Each device conducts for", opts: ["120°","150°","30°","180°"], ans: 3, src: "HMWS-15" },
      { q: "The converters which operate only in two quadrants are", opts: ["dual converter and semi-converters","half-wave and semi converters","full wave and semi converters","half-wave and full-wave converters"], ans: 3, src: "HMWS-15" },
      { q: "When firing angle α of a single phase fully controlled rectifier feeding constant DC current is 30°, the displacement power factor is", opts: ["1","0.5","1/√3","√3/2"], ans: 3, src: "TSGenco-15" },
      { q: "A 3-phase fully controlled converter feeds DC load at constant current 150A. RMS current through each thyristor is", opts: ["50 A","100 A","150√2/√3","150/√3"], ans: 3, src: "TSGenco-15" },
      { q: "Three-pulse converter with freewheeling diode. Operating range of converter is", opts: ["0° ≤ α ≤ 150°","60° ≤ α ≤ 120°","30° ≤ α ≤ 150°","180° ≤ α ≤ 360°"], ans: 0, src: "TSTransco-15" },
      { q: "A four-quadrant operation requires two full converters connected in", opts: ["Series","Parallel","Back-to-back","Series Cascade"], ans: 2, src: "TSTransco-15" },
      { q: "In a dual converter, the circulating current", opts: ["allows smooth reversal of load current but increases response time","does not allow smooth reversal, reduces response time","allows smooth reversal with improved speed of response","flows only if there is no interconnecting inductor"], ans: 2, src: "TSTransco-15" },
      { q: "In a 3-phase converter circuit during commutation when one SCR in one phase is turned on to turn-off SCR in another phase, results in", opts: ["voltage notching","harmonic distortion","voltage sag","voltage swell"], ans: 0, src: "APTransco-17" },
      { q: "The effect of source inductance on single phase and three phase full converters is to", opts: ["increase the load voltage","reduce ripple in load current","make discontinuous current as continuous","reduce the output voltage"], ans: 3, src: "APEPDCL-19" },
      { q: "A 1-φ diode bridge rectifier supplied from 200V, 50 Hz, load = 100Ω. Peak inverse voltage of each diode is", opts: ["400/π V","200 V","200√2 V","400√2/π V"], ans: 2, src: "APEPDCL-19" },
      { q: "A 1-φ diode bridge rectifier supplies highly inductive load (ripple-free current). AC supply side current waveform will be", opts: ["triangular","sinusoidal","constant DC","square"], ans: 3, src: "APEPDCL-19" },
      { q: "Valve power rating of a converter circuit is given by the product of", opts: ["maximum voltage and maximum current","average voltage and average current","peak inverse voltage and rms value of current","peak inverse voltage and average value of current"], ans: 3, src: "APEPDCL-19" },
      { q: "A 3-phase fully controlled rectifier fed from 200 V, 3-phase, 50 Hz supply is fired at α = 45°. The average output voltage is", opts: ["100√2/π V","200√2/π V","300/π V","600/π V"], ans: 3, src: "APSPDCL-19" },
      { q: "In a three-phase full controlled converter, by using six SCRs, commutation occurs every", opts: ["60°","90°","45°","180°"], ans: 0, src: "APPSC-20" },
      { q: "In a two pulse fully controlled bridge converter with freewheeling diode, width of freewheeling diode current pulse is (RL load, continuous conduction)", opts: ["π − α","π + α","2π","2α"], ans: 0, src: "TSSPDCL-22" },
      { q: "A half wave thyristor converter supplies pure inductive load. Triggering angle = 100°, extinction angle will be", opts: ["260°","240°","200°","120°"], ans: 0, src: "TSSPDCL-22" },

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUnit = 0;
let currentQ = 0;
let answered = {}; // {unitIdx_qIdx: chosenOption}
let retryNeeded = {}; // {unitIdx_qIdx: true}
let retryAnswered = {}; // choices made during the current Try Again round
let savedQuestions = {}; // {unitIdx_qIdx: true}
let mode = 'one'; // 'one' | 'all' | 'try'

function unitKey(u, q) { return `${u}_${q}`; }

function getUnit() { return UNITS[currentUnit]; }
function getQuestions() { return getUnit().questions; }

// ─── SCORE ───────────────────────────────────────────────────────────────────
function calcScore() {
  let correct = 0, total = 0;
  Object.entries(answered).forEach(([key, choice]) => {
    const [u, q] = key.split('_').map(Number);
    if (choice === UNITS[u].questions[q].ans) correct++;
    total++;
  });
  return { correct, total };
}

function updateHeader() {
  const { correct, total } = calcScore();
  document.getElementById('hdr-score').textContent = `${correct}/${total}`;
  const allQ = UNITS.reduce((s, u) => s + u.questions.length, 0);
  document.getElementById('hdr-progress').style.width = (total / allQ * 100) + '%';
}

// ─── UNIT TABS ────────────────────────────────────────────────────────────────
function renderUnitTabs() {
  const el = document.getElementById('unit-tabs');
  el.innerHTML = '';
  // "All" tab
  const allTab = document.createElement('button');
  allTab.className = 'unit-tab' + (currentUnit === -1 ? ' active' : '');
  allTab.textContent = 'All Units';
  allTab.onclick = () => { currentUnit = -1; currentQ = 0; render(); };
  el.appendChild(allTab);

  UNITS.forEach((u, i) => {
    const btn = document.createElement('button');
    btn.className = 'unit-tab' + (currentUnit === i ? ' active' : '');
    btn.textContent = u.short + ': ' + u.name.split(':')[1].trim().substring(0,18);
    btn.onclick = () => { currentUnit = i; currentQ = 0; render(); };
    el.appendChild(btn);
  });
}

// ─── DOT ROW (one-by-one mode) ───────────────────────────────────────────────
function renderDots() {
  const el = document.getElementById('dot-row');
  el.innerHTML = '';
  if (mode !== 'one') return;
  const qs = getDisplayQuestions();
  qs.forEach((item, idx) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const key = unitKey(item.unitIdx, item.qIdx);
    if (answered[key] !== undefined) {
      dot.classList.add(answered[key] === item.q.ans ? 'correct' : 'wrong');
    }
    if (idx === currentQ) dot.classList.add('current');
    dot.onclick = () => { currentQ = idx; renderQuestionArea(); renderDots(); renderNav(); };
    el.appendChild(dot);
  });
}

// ─── BUILD DISPLAY QUESTION LIST ─────────────────────────────────────────────
function getBaseQuestions() {
  if (currentUnit === -1) {
    // All units
    const all = [];
    UNITS.forEach((u, ui) => u.questions.forEach((q, qi) => all.push({ q, unitIdx: ui, qIdx: qi })));
    return all;
  }
  return getQuestions().map((q, qi) => ({ q, unitIdx: currentUnit, qIdx: qi }));
}

function getDisplayQuestions() {
  const qs = getBaseQuestions();
  if (mode === 'try') {
    return qs.filter(({ unitIdx, qIdx }) => {
      const key = unitKey(unitIdx, qIdx);
      return retryNeeded[key] || savedQuestions[key];
    });
  }
  return qs;
}

function toggleSave(key) {
  if (savedQuestions[key]) {
    delete savedQuestions[key];
  } else {
    savedQuestions[key] = true;
  }
  render();
}

// ─── RENDER ONE QUESTION ──────────────────────────────────────────────────────
function buildCard(item, showAll) {
  const { q, unitIdx, qIdx } = item;
  const key = unitKey(unitIdx, qIdx);
  const isTryMode = mode === 'try';
  const chosen = isTryMode ? retryAnswered[key] : answered[key];
  const hasFeedback = chosen !== undefined;
  const isLocked = hasFeedback && (!isTryMode || chosen === q.ans);
  const isSaved = !!savedQuestions[key];

  const card = document.createElement('div');
  card.className = 'q-card' + (hasFeedback ? ' answered' : '');
  card.id = 'card-' + key;

  // meta
  const meta = document.createElement('div');
  meta.className = 'q-meta';
  const num = document.createElement('span');
  num.className = 'q-num';
  const qs = getDisplayQuestions();
  const globalIdx = qs.findIndex(x => x.unitIdx === unitIdx && x.qIdx === qIdx);
  num.textContent = 'Q' + (globalIdx + 1);
  const src = document.createElement('span');
  src.className = 'q-source';
  src.textContent = q.src;
  meta.appendChild(num);
  meta.appendChild(src);
  if (isSaved) {
    const savedTag = document.createElement('span');
    savedTag.className = 'q-num';
    savedTag.style.color = 'var(--correct)';
    savedTag.textContent = 'Saved';
    meta.appendChild(savedTag);
  }
  if (currentUnit === -1) {
    const unitTag = document.createElement('span');
    unitTag.className = 'q-num';
    unitTag.style.color = '#7c5cfc';
    unitTag.textContent = UNITS[unitIdx].short;
    meta.appendChild(unitTag);
  }
  card.appendChild(meta);

  // question text
  const qt = document.createElement('p');
  qt.className = 'q-text';
  qt.textContent = q.q;
  card.appendChild(qt);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn';
  saveBtn.style.marginBottom = '14px';
  saveBtn.textContent = isSaved ? 'Saved' : 'Save';
  saveBtn.onclick = () => toggleSave(key);
  card.appendChild(saveBtn);

  // options
  const opts = document.createElement('div');
  opts.className = 'options';
  q.opts.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (hasFeedback) {
      btn.disabled = isLocked;
      if (oi === q.ans) {
        btn.classList.add(chosen === q.ans ? 'correct' : 'reveal-correct');
      }
      if (oi === chosen && chosen !== q.ans) btn.classList.add('wrong');
    }
    btn.onclick = () => answer(key, oi, card, q);

    const letter = document.createElement('span');
    letter.className = 'opt-letter';
    letter.textContent = ['A','B','C','D'][oi];
    btn.appendChild(letter);

    const txt = document.createTextNode(opt);
    btn.appendChild(txt);
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  // result pill (if answered)
  if (hasFeedback) {
    const pill = document.createElement('div');
    pill.className = 'result-pill ' + (chosen === q.ans ? 'correct' : 'wrong');
    pill.innerHTML = chosen === q.ans ? '✓ Correct!' : (isTryMode ? '✗ Try once more' : '✗ Incorrect');
    card.appendChild(pill);

    // solution hint
    if (q.note) {
      const sol = document.createElement('div');
      sol.className = 'solution-box visible';
      sol.innerHTML = `<strong>Note:</strong> ${q.note}`;
      card.appendChild(sol);
    }
  }

  return card;
}

function answer(key, choice, card, q) {
  if (answered[key] !== undefined && mode !== 'try') return;
  if (mode === 'try' && retryAnswered[key] === q.ans) return;
  if (mode !== 'try' && answered[key] === q.ans) return;

  const currentItem = getDisplayQuestions().find(x => unitKey(x.unitIdx, x.qIdx) === key);
  if (!currentItem) return;

  if (mode === 'try') {
    retryAnswered[key] = choice;
  }

  answered[key] = choice;

  if (choice === q.ans) {
    delete retryNeeded[key];
    if (!savedQuestions[key]) delete retryAnswered[key];
  } else {
    retryNeeded[key] = true;
  }

  if (mode === 'try' && choice === q.ans) {
    updateHeader();
    renderDots();
    const remaining = getDisplayQuestions();
    if (remaining.length === 0) {
      setTimeout(() => showTryAgainComplete(), 500);
    } else if (savedQuestions[key]) {
      const newCard = buildCard(currentItem, false);
      card.parentNode.replaceChild(newCard, card);
    } else {
      currentQ = Math.min(currentQ, remaining.length - 1);
      setTimeout(() => render(), 500);
    }
    return;
  }

  // rebuild card in place
  const parent = card.parentNode;
  const newCard = buildCard(
    currentItem,
    mode === 'all'
  );
  parent.replaceChild(newCard, card);
  updateHeader();
  renderDots();
  // auto advance in one-by-one
  if (mode === 'one') {
    const qs = getDisplayQuestions();
    if (currentQ < qs.length - 1) {
      setTimeout(() => { currentQ++; render(); }, 800);
    } else {
      setTimeout(() => showSummary(), 1200);
    }
  }
}

function renderQuestionArea() {
  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  const qs = getDisplayQuestions();
  if (mode === 'one' || mode === 'try') {
    if (qs.length === 0) {
      area.innerHTML = mode === 'try'
        ? '<div class="empty">No incorrect questions here. Nice work.</div>'
        : '<div class="empty">No questions in this unit.</div>';
      return;
    }
    const item = qs[Math.min(currentQ, qs.length-1)];
    area.appendChild(buildCard(item, false));
  } else {
    qs.forEach(item => area.appendChild(buildCard(item, true)));
  }
}

function renderNav() {
  const nav = document.getElementById('nav-bar');
  const total = getDisplayQuestions().length;
  if ((mode === 'one' || mode === 'try') && total > 0) {
    nav.style.display = 'flex';
    document.getElementById('q-idx').textContent = currentQ + 1;
    document.getElementById('q-total').textContent = total;
  } else {
    nav.style.display = 'none';
  }
}

function navigate(dir) {
  const qs = getDisplayQuestions();
  currentQ = Math.max(0, Math.min(qs.length - 1, currentQ + dir));
  renderQuestionArea();
  renderDots();
  renderNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setMode(m) {
  mode = m;
  if (m === 'try') retryAnswered = {};
  document.getElementById('mode-one').classList.toggle('active', m === 'one');
  document.getElementById('mode-all').classList.toggle('active', m === 'all');
  document.getElementById('mode-try').classList.toggle('active', m === 'try');
  currentQ = 0;
  render();
}

function render() {
  renderUnitTabs();
  renderDots();
  renderQuestionArea();
  renderNav();
  updateHeader();
}

function showSummary() {
  const qs = getDisplayQuestions();
  const total = qs.length;
  let correct = 0;
  qs.forEach(({ unitIdx, qIdx, q }) => {
    const key = unitKey(unitIdx, qIdx);
    if (answered[key] === q.ans) correct++;
  });
  const wrong = qs.filter(({ unitIdx, qIdx }) => {
    const key = unitKey(unitIdx, qIdx);
    return answered[key] !== undefined && answered[key] !== UNITS[unitIdx].questions[qIdx].ans;
  }).length;

  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  const nav = document.getElementById('nav-bar');
  nav.style.display = 'none';

  const card = document.createElement('div');
  card.className = 'summary-card';
  card.innerHTML = `
    <h2>Unit Complete! 🎉</h2>
    <p>Here's how you did on this session</p>
    <div class="summary-stats">
      <div class="stat"><div class="stat-val green">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat"><div class="stat-val red">${wrong}</div><div class="stat-label">Wrong</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${Math.round(correct/total*100)}%</div><div class="stat-label">Score</div></div>
    </div>
    <button class="btn primary" onclick="restartUnit()">Restart This Unit</button>
    ${wrong ? "<button class=\"btn\" style=\"margin-left:12px\" onclick=\"setMode('try')\">Try Again</button>" : ''}
    <button class="btn" style="margin-left:12px" onclick="reviewAnswers()">Review Answers</button>
  `;
  area.appendChild(card);
  document.getElementById('dot-row').innerHTML = '';
}

function restartUnit() {
  const qs = getDisplayQuestions();
  qs.forEach(({ unitIdx, qIdx }) => {
    const key = unitKey(unitIdx, qIdx);
    delete answered[key];
    delete retryNeeded[key];
    delete retryAnswered[key];
    delete savedQuestions[key];
  });
  currentQ = 0;
  render();
}

function reviewAnswers() {
  mode = 'all';
  document.getElementById('mode-one').classList.remove('active');
  document.getElementById('mode-all').classList.add('active');
  document.getElementById('mode-try').classList.remove('active');
  render();
}

function showTryAgainComplete() {
  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('dot-row').innerHTML = '';

  const card = document.createElement('div');
  card.className = 'summary-card';
  card.innerHTML = `
    <h2>Try Again Complete!</h2>
    <p>All incorrect questions in this section are now corrected.</p>
    <button class="btn primary" onclick="setMode('one')">Continue Practice</button>
    <button class="btn" style="margin-left:12px" onclick="reviewAnswers()">Review Answers</button>
  `;
  area.appendChild(card);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
