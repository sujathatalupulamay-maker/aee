<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Auth</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
                color: #e2e8f0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .login-card {
                background: #111827;
                border: 1px solid #334155;
                border-radius: 18px;
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
                width: min(430px, calc(100vw - 32px));
                padding: 32px;
            }
            .login-card h1 {
                margin: 0 0 12px;
                font-size: 1.8rem;
                color: #f8fafc;
            }
            .login-card p {
                margin: 0 0 24px;
                color: #94a3b8;
                line-height: 1.6;
            }
            .login-card input {
                width: 100%;
                padding: 14px 16px;
                border-radius: 12px;
                border: 1px solid #334155;
                background: #0f172a;
                color: #f8fafc;
                font-size: 1rem;
                margin-bottom: 16px;
            }
            .login-card button {
                width: 100%;
                padding: 14px 16px;
                border-radius: 12px;
                border: none;
                background: linear-gradient(135deg, #38bdf8, #6366f1);
                color: white;
                font-size: 1rem;
                cursor: pointer;
            }
            .login-card button:hover {
                filter: brightness(1.05);
            }
            .message {
                margin-top: 14px;
                min-height: 22px;
                font-size: 0.95rem;
                color: #f8fafc;
            }
            .message.error { color: #fca5a5; }
            .message.success { color: #86efac; }
        </style>
    </head>
    <body>
        <div class="login-card">
            <h1>Secure Access</h1>
            <p>Enter the access key to open the Power Electronics practice page.</p>
            <input id="accessKey" type="password" placeholder="Enter access key" autocomplete="off" />
            <button id="loginBtn">Open AEE Practice</button>
            <div id="message" class="message"></div>
        </div>

        <script>
            const ACCESS_KEY = "Ravi";
            const STORAGE_KEY = "bookmind_access_key";
            const redirectTarget = new URLSearchParams(window.location.search).get('redirect') || 'aee.html';

            const messageEl = document.getElementById('message');
            const inputEl = document.getElementById('accessKey');
            const buttonEl = document.getElementById('loginBtn');

            function showMessage(text, type = 'error') {
                messageEl.textContent = text;
                messageEl.className = `message ${type}`;
            }

            function isAuthenticated() {
                return localStorage.getItem(STORAGE_KEY) === ACCESS_KEY;
            }

            function goToTarget() {
                window.location.href = redirectTarget;
            }

            if (isAuthenticated()) {
                showMessage('Access already granted. Redirecting...', 'success');
                setTimeout(goToTarget, 800);
            }

            buttonEl.addEventListener('click', () => {
                const value = inputEl.value.trim();
                if (!value) {
                    showMessage('Please enter the access key.');
                    return;
                }
                if (value === ACCESS_KEY) {
                    localStorage.setItem(STORAGE_KEY, ACCESS_KEY);
                    showMessage('Access granted. Redirecting...', 'success');
                    setTimeout(goToTarget, 600);
                } else {
                    showMessage('Incorrect key. Try again.');
                }
            });

            inputEl.addEventListener('keydown', event => {
                if (event.key === 'Enter') {
                    buttonEl.click();
                }
            });
        </script>
    </body>
</html>
